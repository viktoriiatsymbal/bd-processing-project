services:
  kafka:
    image: apache/kafka:4.1.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:29092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    networks:
      - wikipedia-network

  kafka-init:
    image: apache/kafka:4.1.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 10 &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic page-create-events --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic breaking-news-alerts --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic bot-alerts --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --topic spam-alerts --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 &&
      /opt/kafka/bin/kafka-topics.sh --list --bootstrap-server kafka:29092
      "
    networks:
      - wikipedia-network

  ingestion:
    build: ./ingestion
    container_name: wikimedia-ingestion
    depends_on:
      - kafka-init
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: page-create-events
    networks:
      - wikipedia-network

  spark-master:
    image: spark:3.5.8-python3
    container_name: spark-master
    hostname: spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "7077:7077"
      - "8082:8080"
    volumes:
      - ./shared:/opt/spark-streaming
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks:
      - wikipedia-network

  spark-worker:
    image: spark:3.5.8-python3
    container_name: spark-worker
    hostname: spark-worker
    depends_on:
      - spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --webui-port
      - "8081"
      - --cores
      - "2"
      - --memory
      - 2G
    ports:
      - "8083:8081"
    volumes:
      - ./shared:/opt/spark-streaming
    networks:
      - wikipedia-network

networks:
  wikipedia-network:
    driver: bridge
